name: Check and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: prelog-production
  cancel-in-progress: false

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: prelog_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d prelog_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: TestPassword123!
      ADMIN_PATH: /admin
      AUTH_SECRET: test-auth-secret-at-least-32-characters
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/prelog_ci?schema=public
      DATABASE_URL_TEST: postgresql://postgres:postgres@127.0.0.1:5432/prelog_test?schema=public
      NEXTAUTH_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test database
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d postgres -c "CREATE DATABASE prelog_test;" || true

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run checks
        run: npm run test:ci

  build:
    name: Build
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'
    env:
      NODE_ENV: production
      NEXTAUTH_URL: https://iloveprc.com
      AUTH_SECRET: build-time-placeholder-auth-secret-at-least-32-chars
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/prelog_build?schema=public
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: BuildOnlyPassword123!
      ADMIN_PATH: /admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Prepare release
        run: |
          set -euo pipefail

          mkdir -p release/.next

          cp -r .next/standalone/* release/
          cp -r .next/static release/.next/static

          if [ -d public ]; then
            cp -r public release/public
          fi

          if [ -d prisma ]; then
            cp -r prisma release/prisma
          fi

          tar -czf release.tar.gz -C release .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: prelog-release
          path: release.tar.gz
          retention-days: 1

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: prelog-release

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          : "${DEPLOY_HOST:?DEPLOY_HOST secret is required}"
          : "${DEPLOY_KEY:?DEPLOY_KEY secret is required}"
          : "${DEPLOY_PATH:?DEPLOY_PATH secret is required}"
          : "${DEPLOY_USER:?DEPLOY_USER secret is required}"

          SSH_PORT="${DEPLOY_PORT:-22}"
          APP_NAME="${PM2_APP_NAME:-prelog}"
          REMOTE_TAR="/tmp/prelog-${RELEASE_SHA}.tar.gz"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          scp -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
            -i ~/.ssh/deploy_key -P "$SSH_PORT" \
            release.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_TAR"

          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
            -i ~/.ssh/deploy_key -p "$SSH_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "RELEASE_SHA='$RELEASE_SHA' DEPLOY_PATH='$DEPLOY_PATH' PM2_APP_NAME='$APP_NAME' REMOTE_TAR='$REMOTE_TAR' bash -se" <<'EOF'
          set -euo pipefail

          RELEASE_DIR="$DEPLOY_PATH/releases/$RELEASE_SHA"
          CURRENT_LINK="$DEPLOY_PATH/current"

          mkdir -p "$RELEASE_DIR"

          tar -xzf "$REMOTE_TAR" -C "$RELEASE_DIR"

          if [ -f "$DEPLOY_PATH/.env" ]; then
            cp "$DEPLOY_PATH/.env" "$RELEASE_DIR/.env"
          fi

          if [ -f "$DEPLOY_PATH/.env.production" ]; then
            cp "$DEPLOY_PATH/.env.production" "$RELEASE_DIR/.env.production"
          fi

          ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"

          cd "$CURRENT_LINK"

          if command -v npx >/dev/null 2>&1 && [ -d prisma ]; then
            npx prisma migrate deploy
          fi

          cat > ecosystem.config.cjs <<EOC
          module.exports = {
            apps: [
              {
                name: "$PM2_APP_NAME",
                script: "server.js",
                cwd: "$CURRENT_LINK",
                env: {
                  NODE_ENV: "production",
                  PORT: "3000",
                  HOSTNAME: "127.0.0.1"
                }
              }
            ]
          };
          EOC

          pm2 startOrReload ecosystem.config.cjs --update-env
          pm2 save

          rm -f "$REMOTE_TAR"

          echo "deploy finished"
          EOF