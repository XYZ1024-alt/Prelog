name: Check and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: prelog-production
  cancel-in-progress: false

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: prelog_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d prelog_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: TestPassword123!
      ADMIN_PATH: /admin
      AUTH_SECRET: test-auth-secret-at-least-32-characters
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/prelog_ci?schema=public
      DATABASE_URL_TEST: postgresql://postgres:postgres@127.0.0.1:5432/prelog_test?schema=public
      NEXTAUTH_URL: http://127.0.0.1:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run checks
        run: npm run test:ci

  deploy:
    name: Deploy
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          : "${DEPLOY_HOST:?DEPLOY_HOST secret is required}"
          : "${DEPLOY_KEY:?DEPLOY_KEY secret is required}"
          : "${DEPLOY_PATH:?DEPLOY_PATH secret is required}"
          : "${DEPLOY_USER:?DEPLOY_USER secret is required}"

          SSH_PORT="${DEPLOY_PORT:-22}"
          APP_NAME="${PM2_APP_NAME:-prelog}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "RELEASE_SHA='$RELEASE_SHA' DEPLOY_PATH='$DEPLOY_PATH' PM2_APP_NAME='$APP_NAME' bash -se" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          git fetch origin "$RELEASE_SHA"
          git reset --hard "$RELEASE_SHA"
          npm ci
          npx prisma migrate deploy
          npm run build
          pm2 reload "$PM2_APP_NAME" --update-env
          EOF
